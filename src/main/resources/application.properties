# application.properties (safe to commit ? no secrets)

spring.application.name=money-manager-backend
server.port=${PORT:8081}

# MongoDB
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=money-manager

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Brevo API (replaces SMTP)
brevo.api.key=${BREVO_API_KEY}
spring.mail.username=${MAIL_USERNAME}

# CORS
cors.allowed-origins=http://localhost:3000

# Logging
logging.level.org.springframework.data.mongodb=${LOG_LEVEL:WARN}
logging.level.com.moneymanager=${LOG_LEVEL:WARN}