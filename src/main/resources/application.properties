# application.properties  (safe to commit ? no secrets)

spring.application.name=money-manager-backend
server.port=${PORT:8081}
#spring.profiles.active=local

# MongoDB
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=money-manager

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mail  ? no credentials here anymore
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# CORS
cors.allowed-origins=http://localhost:3000

# Logging ? ERROR only in production, DEBUG only locally
logging.level.org.springframework.data.mongodb=${LOG_LEVEL:WARN}
logging.level.com.moneymanager=${LOG_LEVEL:WARN}